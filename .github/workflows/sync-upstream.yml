name: Sync Upstream

on:
  schedule:
    - cron: '0 4 * * *'   # 每天北京时间12点检查一次
  workflow_dispatch:        # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/TQZHR/grok2api.git || true
          git fetch upstream
          git merge upstream/main --no-edit || echo "Merge conflict, skipping"
          git push origin main
